<nav mat-tab-nav-bar routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" class="navbar">
    <a mat-tab-link routerLink="">Main</a>
    <a *ngIf="!getToken()" mat-tab-link routerLink="/login">Login</a>
    <button *ngIf='getToken()' mat-icon-button [matMenuTriggerFor]="menu" aria-label="icon-button with a menu" class="menu">
    <mat-icon>menu</mat-icon>
  </button>
</nav>
<router-outlet></router-outlet>

<div *ngIf="getToken()" class="wrapper">
    {{getUser()}}
    <h1>You're welcome {{user.username}} </h1>
    <p>Your id: {{user.userId}}</p>
</div>

<mat-menu #menu="matMenu">
    <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>
</mat-menu>
